basePath: /qisur
definitions:
  internal_auth.Login:
    properties:
      password:
        example: admin
        type: string
      username:
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  internal_category.Category:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  internal_category.CreateCategoryRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  internal_category.UpdateCategoryRequest:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  internal_product.CreateProductRequest:
    properties:
      category_ids:
        items:
          type: string
        type: array
      description:
        type: string
      name:
        type: string
      price:
        type: number
      stock:
        minimum: 0
        type: integer
    required:
    - name
    - price
    type: object
  internal_product.Product:
    properties:
      categories:
        items:
          $ref: '#/definitions/qisur-service_internal_category.Category'
        type: array
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      price:
        type: number
      stock:
        type: integer
      updated_at:
        type: string
    type: object
  internal_product.ProductHistory:
    properties:
      changed_at:
        type: string
      id:
        type: string
      price:
        type: number
      product_id:
        type: string
      stock:
        type: integer
    type: object
  internal_product.UpdateProductRequest:
    properties:
      category_ids:
        description: If provided, replaces existing categories
        items:
          type: string
        type: array
      description:
        type: string
      name:
        type: string
      price:
        type: number
      stock:
        type: integer
    type: object
  qisur-service_internal_category.Category:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  qisur-service_internal_product.Product:
    properties:
      categories:
        items:
          $ref: '#/definitions/qisur-service_internal_category.Category'
        type: array
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      price:
        type: number
      stock:
        type: integer
      updated_at:
        type: string
    type: object
  qisur-service_pkg_web.PaginatedResponse:
    properties:
      items: {}
      page:
        type: integer
      page_size:
        type: integer
      total_count:
        type: integer
    type: object
  qisur-service_pkg_web.Response:
    properties:
      data: {}
      message:
        type: string
      status:
        type: string
    type: object
info:
  contact:
    email: support@qisur.com.ar
    name: API Support
    url: http://www.qisur.com.ar
  description: REST API and WebSockets for Qisur Challenge products management.
  termsOfService: http://swagger.io/terms/
  title: Qisur API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate and get JWT token (admin/admin or user/user)
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/internal_auth.Login'
      produces:
      - application/json
      responses:
        "200":
          description: token response
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login
      tags:
      - auth
  /api/categories:
    get:
      consumes:
      - application/json
      description: Retrieve a list of all categories.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_category.Category'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
      security:
      - BearerAuth: []
      summary: Get all categories
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Create a new category. Admin role required.
      parameters:
      - description: Category data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_category.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_category.Category'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
      security:
      - BearerAuth: []
      summary: Create category
      tags:
      - categories
  /api/categories/{id}:
    delete:
      description: Delete a category by ID. Admin role required.
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
      security:
      - BearerAuth: []
      summary: Delete category
      tags:
      - categories
    put:
      consumes:
      - application/json
      description: Update an existing category by ID. Admin role required.
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated category data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_category.UpdateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_category.Category'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
      security:
      - BearerAuth: []
      summary: Update category
      tags:
      - categories
  /api/products:
    get:
      consumes:
      - application/json
      description: Retrieve a paginated list of all products.
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.PaginatedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
      security:
      - BearerAuth: []
      summary: Get all products
      tags:
      - products
    post:
      consumes:
      - application/json
      description: Create a new product
      parameters:
      - description: Product data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_product.CreateProductRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_product.Product'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
      security:
      - BearerAuth: []
      summary: Create a product
      tags:
      - products
  /api/products/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a product by ID. Admin role required.
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
      security:
      - BearerAuth: []
      summary: Delete product
      tags:
      - products
    get:
      consumes:
      - application/json
      description: Retrieve a specific product by its ID.
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_product.Product'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
      security:
      - BearerAuth: []
      summary: Get product by ID
      tags:
      - products
    put:
      consumes:
      - application/json
      description: Update fields of an existing product. Admin role required.
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated product data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_product.UpdateProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_product.Product'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
      security:
      - BearerAuth: []
      summary: Update product
      tags:
      - products
  /api/products/{id}/history:
    get:
      consumes:
      - application/json
      description: Retrieve the price and stock change history of a product.
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      - description: Start date (RFC3339)
        in: query
        name: start
        type: string
      - description: End date (RFC3339)
        in: query
        name: end
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_product.ProductHistory'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
      security:
      - BearerAuth: []
      summary: Get product history
      tags:
      - products
  /api/search:
    get:
      consumes:
      - application/json
      description: Search products by query string. Includes associated categories.
      parameters:
      - description: Search query
        in: query
        name: q
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/qisur-service_internal_product.Product'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/qisur-service_pkg_web.Response'
      security:
      - BearerAuth: []
      summary: Search products
      tags:
      - search
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
