server {
    listen 80;

    # Tracker API (Traces)
    location /qisur/api/traces {
        proxy_pass http://qisur-tracker:8087/api/traces;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Main API
    location /qisur/api/ {
        proxy_pass http://qisur-api:8086/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger Documentation
    location /qisur/swagger {
        proxy_pass http://qisur-api:8086/swagger;
        proxy_set_header Host $host;
    }

    # WebSocket
    location /qisur/ws/ {
        proxy_pass http://qisur-api:8086/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Grafana (Logs & Metrics)
    location /qisur/grafana/ {
        proxy_pass http://qisur-grafana:3000;
        proxy_set_header Host $host;
    }

    # Frontend UI
    location /qisur/ {
        proxy_pass http://tracker-ui:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
